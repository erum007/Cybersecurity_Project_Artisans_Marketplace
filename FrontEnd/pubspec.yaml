name: artisans_marketplace
description: Artisans Marketplace - A local artisan ecommerce app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^13.0.0
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  http: ^1.2.2
  mime: ^1.0.6
  http_parser: ^4.0.2
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
