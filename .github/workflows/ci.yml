name: DevSecOps Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# ─────────────────────────────────────────
# BACKEND VALIDATION
# ─────────────────────────────────────────

  backend-test:
    name: Backend Validation
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        working-directory: ./BackEnd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python Source Files
        working-directory: ./BackEnd
        run: |
          find . -name "*.py" | sort | xargs python -m py_compile


# ─────────────────────────────────────────
# SAST
# ─────────────────────────────────────────

  sast:
    name: SAST - BackEnd + Flutter Scan
    runs-on: ubuntu-latest
    needs: backend-test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # PYTHON
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        working-directory: ./BackEnd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # BANDIT
      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        run: |
          bandit -r BackEnd \
          -f json \
          -o bandit-report.json || true

      # SEMGREP
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan
        run: |
          semgrep \
            --config "p/security-audit" \
            --config "p/secrets" \
            --config "p/python" \
            --config "p/javascript" \
            --json \
            --output semgrep-report.json \
            . || true

      # FLUTTER
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"

      - name: Flutter Pub Get
        working-directory: ./FrontEnd
        run: flutter pub get

      - name: Flutter Analyze
        working-directory: ./FrontEnd
        run: flutter analyze || true

      # UPLOAD REPORTS
      - name: Upload SAST Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json


# ─────────────────────────────────────────
# SCA
# ─────────────────────────────────────────

  sca:
    name: SCA - Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: backend-test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # PIP AUDIT
      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        working-directory: ./BackEnd
        run: |
          pip-audit \
          -r requirements.txt \
          --format json \
          > pip-audit-report.json || true

      # TRIVY
      - name: Run Trivy File System Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          output: "trivy-report.json"

      # UPLOAD REPORTS
      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: |
            ./BackEnd/pip-audit-report.json
            trivy-report.json


# ─────────────────────────────────────────
# DOCKER BUILD
# ─────────────────────────────────────────

  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Containers
        run: docker compose build


# ─────────────────────────────────────────
# DAST
# ─────────────────────────────────────────

  dast:
    name: DAST - OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: docker

    permissions:
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # BUILD
      - name: Build Containers
        run: docker compose build

      # START
      - name: Start Containers
        run: docker compose up -d

      # HEALTH CHECK
      - name: Wait for FrontEnd to be Ready
        run: |
          echo "Waiting for FrontEnd on port 3000..."

          for i in {1..30}; do
            if curl -k -s https://localhost:443 > /dev/null; then
              echo "FrontEnd is ready!"
              exit 0
            fi

            echo "Still starting..."
            sleep 5
          done

          echo "FrontEnd failed to start"

          docker ps
          docker logs FrontEnd || true

          exit 1

      # PREPARE REPORTS
      - name: Prepare ZAP Reports
        run: |
          touch report_html.html
          touch report_json.json
          touch report_md.md

          chmod a+rw report_html.html
          chmod a+rw report_json.json
          chmod a+rw report_md.md

      # ZAP
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://localhost:443"
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-a"
        continue-on-error: true

      # UPLOAD REPORTS
      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-reports
          path: |
            report_html.html
            report_json.json
            report_md.md

      # CLEANUP
      - name: Stop Containers
        if: always()
        run: docker compose down
