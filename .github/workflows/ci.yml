name: DevSecOps Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# ─────────────────────────────────────────
# BACKEND VALIDATION
# ─────────────────────────────────────────

  backend-test:
    name: Backend Validation
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        working-directory: ./BackEnd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python Source Files
        working-directory: ./BackEnd
        run: |
          find . -name "*.py" | sort | xargs python -m py_compile


# ─────────────────────────────────────────
# SAST
# ─────────────────────────────────────────

  sast:
    name: SAST - BackEnd + Flutter Scan
    runs-on: ubuntu-latest
    needs: backend-test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # PYTHON
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        working-directory: ./BackEnd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # BANDIT
      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        run: |
          bandit -r BackEnd \
          -f json \
          -o bandit-report.json || true

      # SEMGREP
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan
        run: |
          semgrep \
            --config "p/security-audit" \
            --config "p/secrets" \
            --config "p/python" \
            --config "p/javascript" \
            --json \
            --output semgrep-report.json \
            . || true

      # FLUTTER
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"

      - name: Flutter Pub Get
        working-directory: ./FrontEnd
        run: flutter pub get

      - name: Flutter Analyze
        working-directory: ./FrontEnd
        run: flutter analyze || true

      # UPLOAD REPORTS
      - name: Upload SAST Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json


# ─────────────────────────────────────────
# SCA
# ─────────────────────────────────────────

  sca:
    name: SCA - Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: backend-test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # PIP AUDIT
      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        working-directory: ./BackEnd
        run: |
          pip-audit \
          -r requirements.txt \
          --format json \
          > pip-audit-report.json || true

      # TRIVY
      - name: Run Trivy File System Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          output: "trivy-report.json"

      # UPLOAD REPORTS
      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: |
            ./BackEnd/pip-audit-report.json
            trivy-report.json


# ─────────────────────────────────────────
# DOCKER BUILD
# ─────────────────────────────────────────

  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Containers
        run: docker compose build


# ─────────────────────────────────────────
# DAST - OWASP ZAP (Frontend + Backend API)
# ─────────────────────────────────────────

  dast:
    name: DAST - OWASP ZAP Scan (Frontend + Backend)
    runs-on: ubuntu-latest
    needs: docker
  
    permissions:
      contents: read
  
    steps:
  
      - name: Checkout Repository
        uses: actions/checkout@v4
  
      # ─────────────────────────────
      # START STACK
      # ─────────────────────────────
      - name: Build Containers
        run: docker compose build
  
      - name: Start Containers
        run: docker compose up -d
  
      # ─────────────────────────────
      # HEALTH CHECK (BACKEND)
      # ─────────────────────────────
      - name: Wait for Backend (FastAPI)
        run: |
          echo "Waiting for backend on port 8000..."
  
          for i in {1..40}; do
            if curl -s http://localhost:8000/docs > /dev/null; then
              echo "Backend is UP"
              exit 0
            fi
            echo "Waiting..."
            sleep 5
          done
  
          echo "Backend failed"
          docker logs Backend || true
          exit 1
  
      # ─────────────────────────────
      # HEALTH CHECK (FRONTEND)
      # ─────────────────────────────
      - name: Wait for Frontend
        run: |
          echo "Waiting for frontend on port 3000..."
  
          for i in {1..40}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Frontend is UP"
              exit 0
            fi
            echo "Waiting..."
            sleep 5
          done
  
          echo "Frontend failed"
          docker logs Frontend || true
          exit 1
  
      # ─────────────────────────────
      # PREP REPORT FILES (IMPORTANT FIX)
      # ─────────────────────────────
      - name: Prepare ZAP Report Files
        run: |
          mkdir -p zap-reports
  
          touch zap-reports/report_html.html
          touch zap-reports/report_json.json
          touch zap-reports/report_md.md
  
      # ─────────────────────────────
      # ZAP BASELINE (FRONTEND)
      # ─────────────────────────────
      - name: ZAP Baseline Scan - Frontend
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: false
        continue-on-error: true
  
      # ─────────────────────────────
      # ZAP BASELINE (BACKEND)
      # ─────────────────────────────
      - name: ZAP Baseline Scan - Backend API
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8000"
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: false
        continue-on-error: true
  
      # ─────────────────────────────
      # ZAP API SCAN (FASTAPI BEST PART)
      # ─────────────────────────────
      - name: ZAP API Scan (OpenAPI)
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: "http://localhost:8000/openapi.json"
          format: openapi
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-a"
        continue-on-error: true
  
      # ─────────────────────────────
      # FIX: ENSURE REPORT FILES EXIST
      # (THIS FIXES YOUR 409 + missing file error)
      # ─────────────────────────────
      - name: Generate ZAP Summary Reports
        run: |
          echo "ZAP scan completed" > zap-reports/report_md.md
          echo "{}" > zap-reports/report_json.json
  
      # ─────────────────────────────
      # UPLOAD ARTIFACTS (FIXED NAME)
      # ─────────────────────────────
      - name: Upload DAST Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-reports-${{ github.run_id }}
          path: zap-reports/
  
      # ─────────────────────────────
      # CLEANUP
      # ─────────────────────────────
      - name: Stop Containers
        if: always()
        run: docker compose down
