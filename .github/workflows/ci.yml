# 2. FRONTEND DOCKERFILE

File:

```text
frontend/Dockerfile
```

Code:

```dockerfile
# BUILD STAGE
FROM ghcr.io/cirruslabs/flutter:stable AS build

WORKDIR /app

COPY . .

RUN flutter pub get

RUN flutter build web \
    --dart-define=API_BASE_URL=http://localhost:8000

# SERVE STAGE
FROM nginx:alpine

COPY --from=build /app/build/web /usr/share/nginx/html

EXPOSE 80
```

