---

# 6. DOCKER COMPOSE FILE

File:

```text
docker-compose.yml
```

Code:

```yaml
services:

  mongodb:
    image: mongo
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"

  dbinit:
    image: python:3.11
    container_name: dbinit
    working_dir: /database
    volumes:
      - ./database:/database
    depends_on:
      - mongodb
    command: >
      sh -c "pip install pymongo && python DBinit.py"

  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - dbinit

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
```

