server {
    listen 443 ssl;
    server_name artisan.marketplace;

    ssl_certificate /etc/nginx/ssl/artisan.crt;
    ssl_certificate_key /etc/nginx/ssl/artisan.key;

    # Routes traffic to your Flutter Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # Routes traffic to your FastAPI Backend
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}