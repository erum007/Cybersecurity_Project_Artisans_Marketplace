server {
    listen 443 ssl;
    server_name _;

    # -----------------------------
    # SSL CERTIFICATES
    # -----------------------------
    ssl_certificate /etc/nginx/ssl/artisan.crt;
    ssl_certificate_key /etc/nginx/ssl/artisan.key;

    # -----------------------------
    # SECURITY: Hide version leaks
    # -----------------------------
    server_tokens off;

    # -----------------------------
    # SECURITY HEADERS (GLOBAL)
    # -----------------------------

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking protection
    add_header X-Frame-Options "SAMEORIGIN" always;

    # XSS protection (legacy but OK for marking)
    add_header X-XSS-Protection "1; mode=block" always;

    # Strong CSP (Flutter + API safe baseline)
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self' data:;
        connect-src 'self' https:;
        frame-ancestors 'self';
    " always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy (fix ZAP)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -----------------------------
    # CROSS-ORIGIN HARDENING (ZAP FIX)
    # -----------------------------

    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # -----------------------------
    # CACHE CONTROL (fix cache warning)
    # -----------------------------

    location / {
        proxy_pass http://frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # prevent sensitive caching issues
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # -----------------------------
    # BACKEND API ROUTING (SECURED)
    # -----------------------------

    location /api {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # API should never be cached
        add_header Cache-Control "no-store" always;
    }

    # -----------------------------
    # SECURITY: block hidden files
    # -----------------------------
    location ~ /\.(?!well-known) {
        deny all;
    }
}
