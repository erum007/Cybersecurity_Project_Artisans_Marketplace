server {
    listen 443 ssl;
    server_name _;

    # -----------------------------
    # SSL CERTS
    # -----------------------------
    ssl_certificate /etc/nginx/ssl/artisan.crt;
    ssl_certificate_key /etc/nginx/ssl/artisan.key;

    # -----------------------------
    # SECURITY: Hide version leaks
    # -----------------------------
    server_tokens off;

    # -----------------------------
    # FRONTEND ROUTING
    # -----------------------------
    location / {
        proxy_pass http://frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # REPEATED SECURITY HEADERS (Essential for ZAP)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # THE "ULTIMATE" FLUTTER CSP
        # We allow gstatic, googleapis, and unpkg because Flutter's core engine depends on them.
        # We allow blob: in worker-src because CanvasKit cannot run without it.
        # We allow 'wasm-unsafe-eval' for performance (Flutter's future-proofing).
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://www.gstatic.com https://unpkg.com;
            script-src-elem 'self' 'unsafe-inline' https://www.gstatic.com https://unpkg.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com;
            img-src 'self' data: https: blob:;
            font-src 'self' data: https://fonts.gstatic.com;
            connect-src 'self' https: wss:;
            worker-src 'self' blob:;
            object-src 'none';
            frame-src 'self' https:;
            base-uri 'self';
            form-action 'self';
            frame-ancestors 'self';
            upgrade-insecure-requests;
        " always;

        # Cache Control
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # -----------------------------
    # BACKEND API ROUTING
    # -----------------------------
    location /api {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # REPEATED SECURITY HEADERS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        
        # Keep API very tight
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none';" always;

        add_header Cache-Control "no-store" always;
    }

    # -----------------------------
    # SECURITY: block hidden files
    # -----------------------------
    location ~ /\.(?!well-known) {
        deny all;
    }
}
