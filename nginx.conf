server {

    listen 443 ssl;
    server_name _;

    # SSL CERTS
    ssl_certificate /etc/nginx/ssl/artisan.crt;
    ssl_certificate_key /etc/nginx/ssl/artisan.key;

    # Fixes 14: Insecure TLS Versions (Removes TLS 1.0/1.1)
    ssl_protocols TLSv1.2 TLSv1.3; 
    
    # Tells the server to use its own strong ciphers instead of what the client asks for
    ssl_prefer_server_ciphers on; 

    # This prevents 'Weak Cipher' flags in security scans
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # -----------------------------

    server_tokens off;

    # -----------------------------
    # FRONTEND ROUTING
    # -----------------------------
    location / {
        proxy_pass http://frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SECURITY HEADERS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # THE COMPLETE FLUTTER CSP
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://www.gstatic.com https://unpkg.com blob:;
            script-src-elem 'self' 'unsafe-inline' https://www.gstatic.com https://unpkg.com blob:;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com;
            img-src 'self' data: https: blob: http://127.0.0.1:8000;
            img-src-elem 'self' data: https: blob: http://127.0.0.1:8000;
            font-src 'self' data: https://fonts.gstatic.com;
            connect-src 'self' https: wss: blob: http://127.0.0.1:8000;
            worker-src 'self' blob:;
            object-src 'none';
            frame-src 'self' https:;
            base-uri 'self';
            form-action 'self';
            frame-ancestors 'self';
        " always;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # -----------------------------
    # SERVE UPLOADED IMAGES (Cleaned CORS)
    # -----------------------------
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        
        # 1. Hide the header coming from the backend to avoid duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        
        # 2. Add our own clean header
        add_header 'Access-Control-Allow-Origin' 'https://artisan.marketplace' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        
        proxy_set_header Host $host;
    }

    # -----------------------------
    # BACKEND API ROUTING
    # -----------------------------
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        
        # API SECURITY
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none';" always;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}