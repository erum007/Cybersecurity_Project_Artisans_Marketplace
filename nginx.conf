server {
    listen 443 ssl;
    server_name _;

    # -----------------------------
    # SSL CERTS
    # -----------------------------
    ssl_certificate /etc/nginx/ssl/artisan.crt;
    ssl_certificate_key /etc/nginx/ssl/artisan.key;

    # -----------------------------
    # SECURITY: Hide version leaks
    # -----------------------------
    server_tokens off;

    # -----------------------------
    # FRONTEND ROUTING
    # -----------------------------
    location / {
        proxy_pass http://frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SECURITY HEADERS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # HARDENED CSP (Fixes image_1c54d9.png)
        # - Added 'default-src 'none'' to force fallbacks
        # - Added 'base-uri 'self'' and 'form-action 'self''
        # - Added 'frame-src 'none'' and 'object-src 'none''
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; frame-src 'none'; object-src 'none'; upgrade-insecure-requests;" always;

        # Cache Control
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # -----------------------------
    # BACKEND API ROUTING
    # -----------------------------
    location /api {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # REPEATED SECURITY HEADERS (Ensures consistency)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        
        # API CSP is much stricter
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none';" always;

        add_header Cache-Control "no-store" always;
    }

    # -----------------------------
    # SECURITY: block hidden files
    # -----------------------------
    location ~ /\.(?!well-known) {
        deny all;
    }
}
